function addLog(msg){
  document.getElementById('log').textContent += msg + '
';
}

async function avvia(){
  const btn=document.getElementById('btn');
  btn.disabled=true;
  document.getElementById('log').textContent='';
  addLog('Inizio... '+ROWS.length+' prodotti');

  const BATCH=50;
  let ok=0;
  for(let i=0;i<ROWS.length;i+=BATCH){
    const batch=ROWS.slice(i,i+BATCH);
    try{
      const res=await fetch(SB_URL+'/rest/v1/prodotti',{
        method:'POST',
        headers:{
          'Content-Type':'application/json',
          'apikey':SB_KEY,
          'Authorization':'Bearer '+SB_KEY,
          'Prefer':'return=minimal'
        },
        body:JSON.stringify(batch)
      });
      const txt=await res.text();
      if(res.ok){
        ok+=batch.length;
        addLog('OK: '+ok+'/'+ROWS.length);
      } else {
        addLog('ERRORE '+res.status+': '+txt);
      }
    }catch(e){
      addLog('FETCH ERRORE: '+e.message);
    }
  }
  addLog(ok===ROWS.length ? '✅ COMPLETATO!' : '⚠️ Completato con errori');
  btn.disabled=false;
}
</script>
